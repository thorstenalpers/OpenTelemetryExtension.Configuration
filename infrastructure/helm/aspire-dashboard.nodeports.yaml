apiVersion: v1
kind: Service
metadata:
  name: aspire-nodeport
  namespace: default
spec:
  type: NodePort
  selector:
    app: aspire-dashboard
  ports:
    - name: ui
      port: 18888
      targetPort: 18888
      nodePort: 31888
    - name: otlp-grpc
      port: 18889
      targetPort: 18889
      nodePort: 31889
    - name: otlp-http
      port: 18890
      targetPort: 18890
      nodePort: 31890