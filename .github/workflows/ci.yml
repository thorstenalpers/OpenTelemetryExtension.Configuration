name: "CI"

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

permissions:
  contents: read
  pull-requests: write
  checks: write
  id-token: write

jobs:
  build:
    runs-on: windows-latest

    env:
      Solution: "OpenTelemetryExtension.slnx"
      Test_Project: "src/OpenTelemetryExtension.Configuration.Tests/OpenTelemetryExtension.Configuration.Tests.csproj"
      FORCE_COLOR: "true"
      DOTNET_LOGGING__CONSOLE__COLORBEHAVIOR: Enabled
      FA_LICENSE_MESSAGE_SUPPRESS: 1
      # Run remaining Node 20 JavaScript actions (coveralls, upload-artifact) on Node 24.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Install .NET Tools (local)
        run: |
          dotnet new tool-manifest
          dotnet tool install dotnet-reportgenerator-globaltool

      - name: Restore
        run: dotnet restore "${{ env.Solution }}"

      - name: Build and Test
        run: |
          dotnet build "${{ env.Solution }}" --configuration Release --no-restore
          
          dotnet test "${{ env.Test_Project }}" `
            --collect:"XPlat Code Coverage" `
            --results-directory TestResults/Tests `
            --configuration Release `
            --filter "Category=Unit" `
            --logger "console;verbosity=detailed"
          
          dotnet tool run reportgenerator `
            -reports:TestResults/**/coverage.cobertura.xml `
            -targetdir:TestResults/Reports `
            -reporttypes:"Html;lcov;Cobertura" `
      
      - name: Upload Coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: TestResults/Reports/lcov.info
          
      - name: Upload Test Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage-report
          path: TestResults/Reports
