name: "Deploy Nuget"

on:  
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  packages: write
  pull-requests: write
  checks: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      Solution_Name: "OpenTelemetryExtension.slnx"
      Nuget_Project_Path: "src/OpenTelemetryExtension.Configuration/OpenTelemetryExtension.Configuration.csproj"
      Test_Project_Path: "src/OpenTelemetryExtension.Configuration.Tests/OpenTelemetryExtension.Configuration.Tests.csproj"       

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.x

    # Build only the published library and the unit tests. The solution also
    # contains a WPF sample (net10.0-windows) that cannot build on Linux and
    # integration tests that need a live backend — neither belongs in the deploy.
    - name: Restore
      run: |
        dotnet restore "${{ env.Nuget_Project_Path }}"
        dotnet restore "${{ env.Test_Project_Path }}"

    - name: Build
      run: |
        dotnet build "${{ env.Nuget_Project_Path }}" --configuration Release --no-restore
        dotnet build "${{ env.Test_Project_Path }}" --configuration Release --no-restore

    - name: Run unit tests
      run: dotnet test "${{ env.Test_Project_Path }}" --configuration Release --no-build --filter "Category=Unit" --logger "console;verbosity=detailed"
          
    - name: Pack NuGet Package
      run: dotnet pack "${{ env.Nuget_Project_Path }}" --configuration Release --no-build --output ./nupkg

    - name: Publish to NuGet
      if: success()
      env:
         NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      run: dotnet nuget push ./nupkg/*.nupkg --source https://api.nuget.org/v3/index.json --api-key $NUGET_API_KEY

    - name: Extract Version
      id: get_version
      run: |
        VERSION=$(grep '<Version>' ${{ env.Nuget_Project_Path }} | sed -E 's/.*<Version>(.*)<\/Version>.*/\1/')
        echo "VERSION=$VERSION"
        echo "VERSION=$VERSION" >> $GITHUB_ENV
                                               
    - name: Configure Git Credentials
      run: |
        echo "https://${{ secrets.GH_APIKEY }}@github.com" > ~/.git-credentials
        git config --global credential.helper store
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git remote set-url origin https://x-access-token:${{ secrets.GH_APIKEY }}@github.com/thorstenalpers/OpenTelemetryExtension.Configuration.git

    - name: Create Git Tag
      run: |
        git tag -a "v${{ env.VERSION }}" -m "Release v${{ env.VERSION }}"
        git push origin "v${{ env.VERSION }}"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v${{ env.VERSION }}"
        name: "OpenTelemetryExtension.Configuration ${{ env.VERSION }}"
        body_path: ./release-notes/v${{ env.VERSION }}.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Add GitHub Packages NuGet Source
      run: |
          dotnet nuget add source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --name github --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text

    - name: Publish to GitHub Packages
      run: dotnet nuget push ./nupkg/*.nupkg --source "github" --api-key ${{ secrets.GITHUB_TOKEN }}
